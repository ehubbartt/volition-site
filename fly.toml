app = 'volition-site'
primary_region = 'iad'

[build]

[env]
  NODE_ENV = 'production'
  PORT = '3000'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'suspend'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

# Restart a wedged machine automatically. /health is answered in hooks.server.ts
# before the canonical-host redirect, so the internal probe gets a 200 (not a 308).
[[http_service.checks]]
  method = 'get'
  path = '/health'
  interval = '30s'
  timeout = '5s'
  grace_period = '10s'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
