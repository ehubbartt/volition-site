name: Deploy to Fly.io

# Deploy the app whenever main is updated. Also runnable on demand from the
# Actions tab (workflow_dispatch). Requires a FLY_API_TOKEN repository secret
# (Settings → Secrets and variables → Actions) — create the token with
# `fly tokens create deploy` and paste it in.
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy app
    runs-on: ubuntu-latest
    # Never run two deploys at once; a newer push supersedes an in-flight one.
    concurrency:
      group: deploy-main
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      # --remote-only builds on Fly's builders, so the runner needs no Docker.
      - run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
