# Deploy the SEPARATE staging app (volition-site-staging) to Fly from CI, so no local
# flyctl is needed — you can ship from a phone. It builds on Fly's REMOTE builders
# (--remote-only), so the GitHub runner needs no Docker.
#
# One-time setup (all phone-doable, no secrets in chat or in the repo):
#   1. Fly web dashboard (fly.io) → create app `volition-site-staging` and set its
#      secrets (see docs/DEPLOY-STAGING.md) — PUBLIC_SITE_URL must be the staging URL.
#   2. Fly dashboard → Account → Access Tokens → create a token.
#   3. GitHub → repo Settings → Secrets and variables → Actions → add secret
#      FLY_API_TOKEN with that token.
# Then: push to voli-site-2.0-refactor, or use the "Run workflow" button, to deploy.
name: Deploy staging (Fly)

on:
  workflow_dispatch:
  push:
    branches: [voli-site-2.0-refactor]

concurrency:
  group: deploy-staging
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Ensure FLY_API_TOKEN is set
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          if [ -z "$FLY_API_TOKEN" ]; then
            echo "::error::FLY_API_TOKEN repo secret is not set. Add it in Settings → Secrets → Actions, then re-run."
            exit 1
          fi
      - name: Deploy to volition-site-staging
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: flyctl deploy -c fly.staging.toml --remote-only
