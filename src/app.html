<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/favicon.png" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="theme-color" content="#0f1115" />
		%sveltekit.head%
	</head>
	<!-- preload-data=hover: start fetching a link's data on hover/touchstart, before
	     the click even lands. preload-code=eager: fetch every visible link's JS chunk
	     up front, so route code is never part of a navigation's critical path. -->
	<body data-sveltekit-preload-data="hover" data-sveltekit-preload-code="eager">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
