# Staging / test instance — a SECOND Fly app, fully separate from the production
# `volition-site` app, for trying changes (e.g. the personal boards + unified Dink
# active-tiles index) without touching prod. Deploy with:
#
#   fly deploy -c fly.staging.toml
#
# It shares the same Dockerfile as prod. It points at whatever SUPABASE_URL /
# SUPABASE_ANON_KEY you set as its secrets (see docs/DEPLOY-STAGING.md) — by default
# the same shared Supabase as prod, so you test against real data. PUBLIC_SITE_URL
# MUST be set to this app's own URL so the canonical-host guard + Discord OAuth
# callback resolve to the staging origin, not prod.
app = 'volition-site-staging'
primary_region = 'iad'

[build]

[env]
  NODE_ENV = 'production'
  PORT = '3000'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'suspend'
  auto_start_machines = true
  # 0 = let the test box suspend when idle (cheap); it resumes on the next request.
  # Bump to 1 if you want it always warm.
  min_machines_running = 0
  processes = ['app']

# Restart a wedged machine automatically. /health is answered in hooks.server.ts
# before the canonical-host redirect, so the internal probe gets a 200 (not a 308).
[[http_service.checks]]
  method = 'get'
  path = '/health'
  interval = '30s'
  timeout = '5s'
  grace_period = '10s'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
